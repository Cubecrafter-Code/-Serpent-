<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schlange</title>
    <canvas id="canvas1" width="320" height="180"></canvas>

    <div class="scoreText" id="scoreBox">
      <header class="scoreText">Punktzahl:</header>
      <p class="scoreText" id="score">0</p>
    </div>
    <button id="pauseButton" onclick="pauseGame">Hi</button>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        background-color: #3f2800; /*00*/
        width: var(--screenWidth);
        height: var(--screenHeight);
        object-fit: contain;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .scoreText {
        top: 10px;
        position: absolute;
        width: fit-content;
        font-size: 42px;
        color: aqua;
        font-weight: bold;
        pointer-events: none;
        -webkit-text-stroke: 2px aqua;
        margin: 0;
      }

      #scoreBox {
        position: absolute;
        left: 10px;
      }

      #score {
        top: 50px;
      }
      #pauseButton {
        top: 10px;
        right: 10px;
        width: 5%;
        height: 5%;
        background-color: #222;
      }
    </style>
  </head>
  <body onload="Game()">
    <div class="menu" id="mainMenu">
      <header id="menuText"></header>
      <div id="buttonDiv"></div>
    </div>
    <style>
      [hidden] {
        display: none !important;
      }

      #mainMenu {
        position: absolute;
        width: var(--menuButtonWidth);
        left: 50%;
        transform: translateX(-50%);
        top: 100px;

        background: linear-gradient(90deg, chocolate, red, chocolate);
        display: flex;
        flex-direction: column;
        text-align: center;
        font-size: 48px;
        font: bold;
        font-family: monospace;
        color: rgb(0, 0, 0);
        font-weight: bold;
        pointer-events: none;
        -webkit-text-stroke: 2px black;

        height: 75%;
        border-radius: 20px;
        pointer-events: all;

        border-style: solid;
        border-color: rgba(0, 0, 255, 0.5);
        border-width: 10px;
        transition: width 0.3s ease;
      }

      #mainMenu.expanded {
        width: 50%;
      }

      #buttonDiv {
        overflow-y: auto;
        flex: 1;
        pointer-events: all;
        display: flex;
        flex-direction: column;
      }

      #menuText {
        margin-top: 25px;
      }

      .menuButton {
        padding: 10px;
        font-size: 48px;
        font-family: monospace;
        height: fit-content;
        background: linear-gradient(90deg, cyan, #00a0a0, cyan);
        border-color: blueviolet;
        border-width: 5px;
        border-radius: 20px;

        margin: 10px;

        pointer-events: all;
      }

      .table {
        border-collapse: collapse;
        color: rgb(0, 0, 0);
        -webkit-text-stroke-width: 0;

        overflow: hidden;
        margin: 10px;
        table-layout: fixed;
        text-align: center;
        border: 10px, solid, black;
        border-radius: 20px;
        border-collapse: separate;
        border-spacing: 0;

        border: 3px solid #ff0000;
        border-radius: 10px;
        box-shadow: 0 0 0 4px black;
      }
      .tableRow {
        border-bottom: 1px solid #ddd;
      }
      .tableData {
        padding: 5px;
        text-align: center;
        font-size: 24px;
        background: linear-gradient(90deg, #00abab, darkcyan);
        border-bottom: 2px solid rgba(0, 0, 0, 0.1);
      }
      th {
        background-color: #222;
        color: white;
        font-weight: bold;
      }

      /* Gold */
      .tableRow:nth-child(2) td {
        background: linear-gradient(90deg, #ffd700, #ffb300);
        color: #222;
        font-weight: bold;
      }

      /* Silver */
      .tableRow:nth-child(3) td {
        background: linear-gradient(90deg, #c0c0c0, #9e9e9e);
        color: #222;
        font-weight: bold;
      }

      /* Bronze */
      .tableRow:nth-child(4) td {
        background: linear-gradient(90deg, #cd7f32, #a65e2e);
        color: white;
        font-weight: bold;
      }

      /* Last place */
      .tableRow:last-of-type td {
        background: linear-gradient(90deg, #7cfc00, #00ff00);
        color: white;
        font-weight: bold;
      }
      .tableRow:nth-child(2) td,
      .tableRow:nth-child(3) td,
      .tableRow:nth-child(4) td {
        border-bottom: 3px solid rgba(0, 0, 0, 0.2);
      }
    </style>
    <script>
      let deviceInfo = {
        width: window.innerWidth,
        height: window.innerHeight,
        resulutionMult:
          screen.height / document.getElementById("canvas1").height,
        aspectRatio: screen.width / screen.height,
      };

      let css = {
        mainMenu: document.getElementById("mainMenu"),
        menuText: document.getElementById("menuText"),
        menuButtons: document.getElementsByClassName("menuButton"),
        tables: {},
      };

      css.mainMenu.buttonDiv = document.getElementById("buttonDiv");

      document.documentElement.style.setProperty(
        "--screenWidth",
        deviceInfo.width + "px",
      );
      document.documentElement.style.setProperty(
        "--screenHeight",
        deviceInfo.height + "px",
      );
      document.documentElement.style.setProperty(
        "--menuButtonWidth",
        "500" + "px",
      );
      document.documentElement.style.setProperty(
        "--menuLeft",
        calcMiddle(deviceInfo.width, css.mainMenu.offsetWidth) + "px",
      );

      function calcMiddle(x, offset) {
        return (x - offset) / 2;
      }
      let debugCounter = 0;

      let hardModeMult;
      let speedMult =
        1 /
        Number(
          localStorage.getItem("speedMult") === null
            ? 1
            : localStorage.getItem("speedMult"),
        );
      isNaN(Number(speedMult)) || Number(speedMult) === 0
        ? (speedMult = 1)
        : (speedMult = 1 / Number(speedMult));
      let Key = {};

      let tickCounter = 0;
      let alive = false;
      let start = false;
      let updateloop;
      let directionChange;

      let map = {
        start_x: 40,
        start_y: 10,
        width: 240,
        height: 160,
        tile_length: 10,
        appleCout: 2,
      };

      let canvas = document.getElementById("canvas1");
      let ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;

      let backgroundImage = new Image();
      let bufferDirection;
      let Snake = {
        x: 80,
        y: 80,
        last: { x: 80, y: 80 },
        nextAngle: 0,
        bufferAngle: 0,
        angle: 0,
        segmentCount: 4,
        startSegmentCount: 4,
        width: map.tile_length,
        height: map.tile_length,
        src: "../textures/Spreadsheet.png",
        srcCoords: { x: 10, y: 0 },
      };

      let options = {
        preventAccidentalLeave: 20,
      };

      let SnakeSegments = [];

      let tiles = [];
      for (let b = 0; b < map.width / map.tile_length; b++) {
        for (let c = 0; c < map.height / map.tile_length; c++) {
          let tileObj = {
            name: `tileObj_${b}_${c}`,
            x: b * map.tile_length,
            y: c * map.tile_length,
            state: "free",
          };
          tiles.push(tileObj);
        }
      }

      let Apples = [];
      let Apple = {
        x: 230,
        y: 80,
        width: map.tile_length,
        height: map.tile_length,
        src: "../textures/Strawberry.png",
        srcCoords: { x: 0, y: 0 },
        angle: 0,
      };
      let appleGrow = false;

      document.onkeydown = function (e) {
        if (e.repeat === false) {
          keyHandler(e.key, true);
        }
      };

      document.onkeyup = function (e) {
        keyHandler(e.key, false);
      };

      function keyHandler(inputKey, state) {
        Key.w = false;
        Key.a = false;
        Key.s = false;
        Key.d = false;

        if (
          inputKey === "ArrowUp" ||
          inputKey === "ArrowLeft" ||
          inputKey === "ArrowDown" ||
          inputKey === "ArrowRight"
        ) {
          switch (inputKey) {
            case "ArrowUp":
              inputKey = "w";
              break;
            case "ArrowLeft":
              inputKey = "a";
              break;
            case "ArrowDown":
              inputKey = "s";
              break;
            case "ArrowRight":
              inputKey = "d";
              break;
          }
        }
        Key[inputKey] = state;
        if (start && inputKey !== "Escape") {
          alive = true;
          start = false;
          directionHandler();
          updateDirection();
          SnakeSegments.pop();
          manageSnakeSegments(Snake.x, Snake.y);
          update();
        }
        miscKeybinds(inputKey, state);
      }

      function miscKeybinds(inputKey, state) {
        if (state) {
          if (Key["+"]) {
            Snake.segmentCount += 5;
          }
          if (Key.Escape) {
            pauseGame();
          }
          if (Key.L) {
            console.log(tiles);
          }
          if (Key.P) {
            css.mainMenu.replaceChildren();
          }
        }
      }

      document.addEventListener("touchstart", function (e) {
        touch.lastpos = touch.currentpos = {
          x: e.touches[0].clientX,
          y: e.touches[0].clientY,
        };
        //e.preventDefault();
      });

      document.addEventListener("touchmove", function (e) {
        //swipe(e);
        //console.log()
        touch.currentpos = {
          x: e.touches[0].clientX,
          y: e.touches[0].clientY,
        };
        calcDir(touch.currentpos, touch.lastpos);
        //e.preventDefault();
      });

      document.addEventListener("touchend", function (e) {
        /*let swipe = {
          dir: Object.entries(touch.dir).sort((a, b) => {
            return b[1] - a[1];
            })[0][0],
            };*/

        //console.log(swipe.dir, typeof swipe.dir);

        touch.dir.w = 0;
        touch.dir.d = 0;
        touch.dir.a = 0;
        touch.dir.s = 0;
        //e.preventDefault();
      });

      function calcDir(objA, objB) {
        let difference = { x: objA.x - objB.x, y: objA.y - objB.y };
        console.log(difference.x, difference.y);
        if (
          Math.abs(difference.x) < swipeThreshold &&
          Math.abs(difference.y) < swipeThreshold
        ) {
          return;
        }

        touch.lastpos = touch.currentpos;
        keyHandler(
          Math.abs(difference.x) > Math.abs(difference.y)
            ? difference.x < 0
              ? "a"
              : "d"
            : difference.y < 0
              ? "w"
              : "s",
          true,
        );
      }

      let touch = {
        lastpos: { x: 0, y: 0 },
        currentpos: { x: 0, y: 0 },
        dir: { w: 0, a: 0, s: 0, d: 0 },
      };

      let swipeThreshold =
        (deviceInfo.aspectRatio < canvas.width / canvas.height
          ? deviceInfo.width
          : deviceInfo.height) / 20; //5%

      /*
                if(i assume the lock threshold should be more fine than the other but aigan not too small so u dont get diagonal swipes and then replace it eg swipe thershhold exeeded then from that exeed pos wehn smaller threshhold exeeded then use pos now eg x180 y20 new pos 100 20 when newpos.y and current pos differ by enough eg 50px then use that so mabye then x80 y240 after 20 still 220 y remaining and even if all other 80px still are bout to happen y is more dominant.

            if u use the pos after small treshhold wich is to make sure that the new swipe started and then use the old threshhold - the new one so its extreamly clean then u aigna check if its more new than old so x 500 y 200 is only right => new check still right => new check still right bc right is more dominant but when u finally go more up / down u can use the logic
              ){}
            1. pos = touchstart
            2. threshhold exeed calc dir and set pos there
            3. if other axis > small threshhold set new pos then step 1 aigan



            fixes mabye reset threshhold every few seconds so touchstart 10 seconds => x 80 y 20 then swipe x  20 y 100 but x threshhold gets called then y
      */

      //Menu

      function createElements(elementArr, parentObj, replaceBool = true) {
        if (replaceBool) {
          parentObj.replaceChildren();
        }
        let tempCounter = 0;
        for (const element of elementArr) {
          let tempElement = document.createElement(element.type);

          element?.id
            ? (tempElement.id = element.id)
            : (tempElement.id = element.type + `_${tempCounter}`);

          for (const property in element) {
            switch (property) {
              case "type": {
                break;
              }
              case "id": {
                break;
              }
              case "children": {
                break;
              }
              case "text": {
                tempElement.innerText = element[property];
                break;
              }
              case "className": {
                tempElement.className = element[property];
                break;
              }
              case "onclick": {
                //on rule expand later
                tempElement[`${property}`] = element[property];
                break;
              }
              default:
                tempElement.setAttribute(property, element[property]);
            }
          }

          if (element?.children) {
            createElements(element.children, tempElement, false);
          }
          parentObj.append(tempElement);

          tempCounter++;
        }
      }

      class menuButtonJs {
        constructor(text, onclick, id = null) {
          this.type = "button";
          this.text = text;
          this.className = "menuButton";
          this.onclick = onclick;
          this.id = id;
        }
      }

      function mainMenu() {
        createElements(
          [
            new menuButtonJs("Continue", continueGame),
            new menuButtonJs("Settings", settingsMenu),
            new menuButtonJs("Leaderboard", leaderboard),
            new menuButtonJs("Statistics", function () {
              debugButton(this);
            }),
            new menuButtonJs("New Game", newGame),
            new menuButtonJs("Quit", quit),
          ],
          css.mainMenu.buttonDiv,
        );
        css.menuText.innerText = "Menu";
        css.mainMenu.classList.remove("expanded");
        css.mainMenu.hidden = false;
      }

      function continueGame() {
        alive = true;
        update();
        css.mainMenu.hidden = true;
      }

      function pauseGame() {
        alive = false;
        mainMenu();
      }

      function settingsMenu() {
        css.mainMenu.classList.add("expanded");
        createElements(
          [
            new menuButtonJs("Back", mainMenu),
            new menuButtonJs("changeSpeedmult", changeSpeedmult),
            new menuButtonJs("walls", function () {
              debugButton(this);
            }),
            new menuButtonJs("hardMode", function () {
              debugButton(this);
            }),
            new menuButtonJs("StartsegmentCount", function () {
              debugButton(this);
            }),

            new menuButtonJs("more apples", function () {
              debugButton(this);
            }),
          ],
          css.mainMenu.buttonDiv,
        );
      }

      function changeSpeedmult() {
        speedMult = prompt("Was soll der Geschwindigkeitsmultiplikator sein?");
        isNaN(Number(speedMult)) || speedMult == 0 || speedMult === null
          ? (speedMult = 1)
          : (speedMult = 1 / Number(speedMult));
        localStorage.setItem("speedMult", speedMult);
      }

      function leaderboard() {
        css.mainMenu.classList.add("expanded");
        createElements(
          [
            new menuButtonJs("Back", mainMenu),
            new tableAssembler("leaderboardTable", [
              ["Rank", "Name", "Score"],
              ["🏆", "123456789", "999"],
              ["🥈", "123456789", "999"],
              ["🥉", "123456789", "999"],
              ["4th", "123456789", "999"],
              ["5th", "123456789", "999"],
              ["6th", "123456789", "999"],
              ["7th", "123456789", "999"],
              ["8th", "123456789", "999"],
              ["9th", "123456789", "999"],
              ["Xth", "123456789", "999"],
              ["💩", "Oma", "1"],
            ]),
          ],
          css.mainMenu.buttonDiv,
        );
        css.tables.leaderboard = document.getElementById("leaderBoardTable");
      }

      class tableAssembler {
        constructor(id, text) {
          this.type = "table";
          this.className = "table";
          this.id = id;
          this.children = [];

          for (let n = 0; n < text.length; n++) {
            this.children.push({
              type: "tr",
              className: "tableRow",
              children: [],
            });
            for (let i = 0; i < text[n].length; i++) {
              this.children[n].children.push({
                type: `${n === 0 ? "th" : "td"}`,
                text: text[n][i],
                className: "tableData",
                id: null,
              });
            }
          }
          this.children.push({
            type: "colgroup",
            children: [
              { type: "col", width: "25%" },
              { type: "col", width: "50%" },
              { type: "col", width: "25%" },
            ],
          });
        }
      }

      function newGame() {
        if (
          Snake.segmentCount - Snake.startSegmentCount >=
          options.preventAccidentalLeave
        ) {
          return;
        }
        document.getElementById("score").innerText = 0;

        Snake.x = 80;
        Snake.y = 80;
        Snake.last.x = Snake.x;
        Snake.last.y = Snake.y;
        Snake.nextAngle = 0;
        Snake.bufferAngle = 0;
        Snake.angle = 0;
        Snake.segmentCount = Snake.startSegmentCount;

        SnakeSegments = [];
        generateSnakeSegments(Snake.x, Snake.y);
        directionHandler();
        updateDirection();
        manageSnakeSegments(Snake.x, Snake.y);

        Apple.x = 230;
        Apple.y = 80;

        for (let n = 0; n < tiles.length; n++) {
          tiles[n].state = "free";
        }

        tickCounter = 0;
        hardModeMult = 1;
        alive = true;
        start = true;
        continueGame();
      }

      function generateSnakeSegments(x, y) {
        if ((x - map.start_x) / map.tile_length < Snake.segmentCount) {
          Snake.x += Snake.segmentCount * map.tile_length - map.start_x;

          if (Snake.x >= Apple.x) {
            Snake.x = Apple.x - map.tile_length;
          }

          let tempSegment = {
            x: Snake.x,
            y: Snake.y,
            angle: Snake.angle,
          };

          let tempSnakeSegments = [tempSegment];

          let abc = 0;

          while (Snake.segmentCount > tempSnakeSegments.length && abc < 200) {
            abc++;
            let segmentDirection;
            let repeatSegmentSpawnAmount;
            if (tempSegment.y === Snake.y) {
              if (tempSegment.x !== map.start_x) {
                segmentDirection = 180;
                repeatSegmentSpawnAmount =
                  (tempSegment.x - map.start_x) / map.tile_length;
              } else {
                if (
                  ((tempSegment.x - map.start_x) / map.tile_length) % 2 ===
                  0
                ) {
                  segmentDirection = 90;

                  repeatSegmentSpawnAmount =
                    ((map.height - tempSegment.y) * 1) / map.tile_length;
                }
              }
            } else {
              if (
                tempSegment.y === map.height ||
                tempSegment.y === Snake.y - map.tile_length
              ) {
                if (
                  ((tempSegment.x - map.start_x) / map.tile_length) % 2 ===
                  0
                ) {
                  segmentDirection = 0;
                  repeatSegmentSpawnAmount = 1;
                } else {
                  segmentDirection = 270;
                  if (
                    tempSegment.x ===
                    map.start_x + map.width - map.tile_length
                  ) {
                    repeatSegmentSpawnAmount =
                      (tempSegment.y - map.start_y) / map.tile_length;
                  } else {
                    if (tempSegment.y === Snake.y - map.tile_length) {
                      repeatSegmentSpawnAmount =
                        (tempSegment.y - map.start_y - map.tile_length) /
                        map.tile_length;
                    } else {
                      repeatSegmentSpawnAmount =
                        (tempSegment.y - Snake.y - map.start_y) /
                        map.tile_length;
                    }
                  }
                }

                //Snake.segmentCount - tempSnakeSegments.length;
              } else {
                if (
                  tempSegment.y === Snake.y + map.tile_length ||
                  tempSegment.y === map.start_y + map.tile_length
                ) {
                  if (
                    ((tempSegment.x - map.start_x) / map.tile_length) % 2 ===
                    0
                  ) {
                    segmentDirection = 90;
                    if (tempSegment.y === map.start_y + map.tile_length) {
                      repeatSegmentSpawnAmount =
                        (Snake.y - tempSegment.y - map.tile_length) /
                        map.tile_length;
                      if (
                        tempSegment.x ===
                        map.start_x + map.width - map.tile_length * 2
                      ) {
                        repeatSegmentSpawnAmount++;
                      }
                    } else {
                      repeatSegmentSpawnAmount =
                        ((map.height - tempSegment.y) * 1) / map.tile_length;
                    }
                  } else {
                    segmentDirection = 0;
                    repeatSegmentSpawnAmount = 1;
                  }
                } else {
                  if (tempSegment.y === map.start_y) {
                    if (
                      tempSegment.x ===
                      map.start_x + map.width - map.tile_length
                    ) {
                      segmentDirection = 180;
                      repeatSegmentSpawnAmount =
                        (tempSegment.x - map.start_x) / map.tile_length;
                    } else {
                      if (tempSegment.x === map.start_x) {
                        segmentDirection = 90;
                        repeatSegmentSpawnAmount =
                          ((Snake.y - tempSegment.y - map.tile_length) * 1) /
                          map.tile_length;
                      }
                    }
                  } else {
                    segmentDirection = 0;
                    repeatSegmentSpawnAmount =
                      Snake.segmentCount - tempSnakeSegments.length;
                  }
                }
              }
            }

            repeatSegmentSpawn(repeatSegmentSpawnAmount, segmentDirection);
          }
          tempSnakeSegments.pop();
          tempSnakeSegments.forEach((element) => {
            manageSnakeSegments(element.x, element.y);
          });

          function repeatSegmentSpawn(amount, segmentDirection) {
            if (amount > Snake.segmentCount) {
              amount = Snake.segmentCount - tempSnakeSegments.length;
            }
            for (let n = 0; n < amount; n++) {
              let tempSegmentAxis =
                segmentDirection === 0 || segmentDirection === 180 ? "x" : "y";
              let invert =
                segmentDirection === 0 || segmentDirection === 90 ? 1 : -1;
              tempSegment[tempSegmentAxis] += map.tile_length * invert;
              tempSnakeSegments.unshift({
                x: tempSegment.x,
                y: tempSegment.y,
                id: n,
              });
            }
          }
        } else {
          for (let n = Snake.segmentCount; n > 0; n--) {
            manageSnakeSegments(Snake.x - map.tile_length * n, y);
          }
        }
      }

      function debugButton(caller) {
        console.log(`${caller.innerText} + needs a function`);
      }

      function quit() {
        close();
      }

      //Game

      function Game() {
        //only functions
        newGame();

        pauseGame();
        start = false;

        loadImages();
        draw();
      }

      function update() {
        if (start || (!alive && (tickCounter === 0 || tickCounter >= 10))) {
          return;
        }

        updateloop = setTimeout(update, (15 * speedMult) / hardModeMult);

        directionHandler();
        move(Snake);

        if (tickCounter >= map.tile_length) {
          updateDirection();
          checkCollision();
          manageSnakeSegments(Snake.x, Snake.y);
          updateTiles();

          tickCounter = 0;
          if (Snake.x === Apple.x && Snake.y === Apple.y) {
            eat();
          } else {
            appleGrow = false;
          }
          if (Key.Meta && Key.Alt && Key.Control) {
            Snake.nextAngle += Snake.angle >= 270 ? -270 : 90;
          }
          /*console.log(
                      Object.entries(
                        tiles.reduce(
                          (acc, { state }) => ({
                            ...acc,
                            [state]: (acc[state] || 0) + 1,
                          }),
                          {},
                        ),
                      )
                        .map(([state, count]) => `${state}: ${count}`)
                        .join("\n"),
                    );
                    */
        }

        tickCounter++;
      }

      function directionHandler() {
        let bufferDirection = Snake.nextAngle;
        if (Key.w === true) {
          Snake.nextAngle = 270;
        }
        if (Key.s === true) {
          Snake.nextAngle = 90;
        }
        if (Key.a === true) {
          Snake.nextAngle = 180;
        }
        if (Key.d === true) {
          Snake.nextAngle = 0;
        }

        if (
          bufferDirection !== Snake.nextAngle &&
          Snake.bufferAngle === Snake.angle
        ) {
          directionChange = true;
          Snake.bufferAngle = bufferDirection;
        }
      }

      function getInverseDir(normalDir) {
        return normalDir + 180 < 360 ? normalDir + 180 : normalDir - 180;
      }

      function updateDirection() {
        let wrongDir = getInverseDir(Snake.angle);

        if (
          directionChange &&
          (Snake.nextAngle === Snake.angle ||
            getInverseDir(Snake.nextAngle) === Snake.angle) &&
          Snake.bufferAngle !== getInverseDir(Snake.angle)
        ) {
          Snake.angle = Snake.bufferAngle;
        } else {
          if (Snake.nextAngle !== wrongDir) {
            directionChange = false;
            Snake.angle = Snake.nextAngle;
            Snake.bufferAngle = Snake.angle;
          }
        }
      }

      function move(obj) {
        if (!obj?.last) {
          obj.last = { x: obj.x, y: obj.y };
        }
        switch (obj.angle) {
          case 0:
            obj.x = obj.last.x + tickCounter;
            break;
          case 90:
            obj.y = obj.last.y + tickCounter;
            break;
          case 180:
            obj.x = obj.last.x - tickCounter;
            break;
          case 270:
            obj.y = obj.last.y - tickCounter;
            break;
        }
      }

      function checkCollision() {
        /*if(Snake.x > map.start_x + map.width - map.tile_length || Snake.x < map.start_x || Snake.y > map.start_y + map.height - map.tile_length || Snake.y < map.start_y){
                                                          dead();
                                                  }*/

        if (Snake.x > map.start_x + map.width - map.tile_length) {
          Snake.x -= map.width;
        }
        if (Snake.x < map.start_x) {
          Snake.x += map.width;
        }
        if (Snake.y > map.start_y + map.height - map.tile_length) {
          Snake.y -= map.height;
        }
        if (Snake.y < map.start_y) {
          Snake.y += map.height;
        }

        if (adressTiles(Snake.x, Snake.y, "read").state === "segment") {
          dead();
        }
      }

      class SnakeSegmentConstructor {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.angle = Snake.angle;
          this.angle_b;
          this.width = map.tile_length;
          this.height = map.tile_length;
          this.src = "../textures/Spreadsheet.png";
          this.srcCoords = this.calcTexture();
          this.img = new Image();
          this.img.src = this.src;
        }
        calcTexture() {
          let previousAngle = SnakeSegments[SnakeSegments.length - 1]?.angle;
          if (this.angle === previousAngle) {
            return { x: 10, y: 10 };
          } else {
            if (
              (this.angle === 0 && previousAngle === 270 ? 360 : this.angle) <
              (previousAngle === 0 && this.angle === 270 ? 360 : previousAngle)
            ) {
              this.width = -1 * map.tile_length;
            }
            return { x: 0, y: 10 };
          }
        }
      }

      function manageSnakeSegments(x, y) {
        if (SnakeSegments.length > 0) {
          adressTiles(Snake.last.x, Snake.last.y, "segment");
        }
        SnakeSegments.push(new SnakeSegmentConstructor(x, y));
        if (SnakeSegments.length > Snake.segmentCount) {
          let oldSegment = SnakeSegments.shift();
          adressTiles(
            oldSegment?.last === undefined ? oldSegment.x : oldSegment.last.x,
            oldSegment?.last === undefined ? oldSegment.y : oldSegment.last.y,
            "free", //removeoldSegment
          );
          adressTiles(SnakeSegments[0].x, SnakeSegments[0].y, "free"); //state: "tail"
        }
      }

      function updateTiles() {
        Snake.last.x = Snake.x;
        Snake.last.y = Snake.y;
        adressTiles(Snake.x, Snake.y, "head");
      }

      function eat() {
        Snake.segmentCount++;
        appleGrow = true;
        document.getElementById("score").textContent =
          (Snake.segmentCount - Snake.startSegmentCount) / speedMult;

        let freeTiles = tiles.filter(
          (tileObj) => tileObj.state === "free" && tileObj.state !== "head",
        );

        if (freeTiles.length === 0) {
          alert("U WIN!!!");
          alive = false;
          Apple.x *= -1;
        } else {
          let newAppleTile =
            freeTiles[Math.floor(Math.random() * freeTiles.length)];
          Apple.x = newAppleTile.x + map.start_x;
          Apple.y = newAppleTile.y + map.start_y;
        }
        if (hardModeMult < 2 && true) /*hard mode is on*/ {
          hardModeMult += 0.04;
        }
      }

      function adressTiles(x, y, state) {
        //xy in px
        let targetTile =
          tiles[
            (((x - map.start_x) / map.tile_length) * map.height) /
              map.tile_length +
              (y - map.start_y) / map.tile_length
          ];
        if (state === "read") {
          return targetTile;
        } else {
          if (targetTile === undefined) {
            canvas.setAttribute("style", "background-color:#ff0000");
            console.log(targetTile, x, y, state);
          } else {
            targetTile.state = state;
          }
        }
      }

      function dead() {
        alive = false;
        start = false;
        Snake.nextAngle = "none";
        //alert(`You ate: ${Snake.segmentCount - 3} Apples`);
        mainMenu();
        createElements(
          [
            new menuButtonJs("Main Menu", function () {
              newGame();
              pauseGame();
              mainMenu();
            }),
            new menuButtonJs("LeaderBoardEntry", function () {
              debugButton(this);
            }),
            new menuButtonJs("New Game", newGame),
            new tableAssembler("gameStats", [
              ["Rank", "", "smth"],
              ["Score", "", "smth"],
              ["ApplesEaten", "", "smth"],
            ]),
          ],
          css.mainMenu.buttonDiv,
        );
        css.menuText.innerText = "You Died";
      }

      //Draw

      function loadImages() {
        backgroundImage.src = "../textures/Background.png";
        Snake.img = new Image();
        Snake.img.src = Snake.src;
        Apple.img = new Image();
        Apple.img.src = Apple.src;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(backgroundImage, 0, 0);
        //ctx.fillStyle = "#30ff30";
        //ctx.fillRect(map.start_x, map.start_y, map.width, map.height);

        rotate(SnakeSegments[0], {
          x: 20,
          y: 0,
          angle: getInverseDir(SnakeSegments[0].angle),
        });
        rotate(SnakeSegments[1], {
          x: 0,
          y: 0,
          angle: getInverseDir(SnakeSegments[1].angle),
        });
        for (let n = 2; n < SnakeSegments.length - 1; n++) {
          rotate(SnakeSegments[n]);
        }
        rotate(SnakeSegments[SnakeSegments.length - 1], {
          x: 0,
          y: 0,
          angle: SnakeSegments[SnakeSegments.length - 2].angle,
        });
        rotate(Apple);
        ctx.fillStyle = "#FF6A00";
        rotate(Snake);
        if (!appleGrow) {
          move(SnakeSegments[0]);
        }
        /*
        ctx.fillRect(
          touch.lastpos.x / (deviceInfo.width / canvas.width),
          touch.lastpos.y / ((deviceInfo.height - 2000) / canvas.height),
          swipeThreshold,
          swipeThreshold,
        );
        
        let aspectRatioRatio =
          canvas.width /
          canvas.height /
          (canvas.getBoundingClientRect().width /
            canvas.getBoundingClientRect().height);

        ctx.fillRect(
          touch.lastpos.x /
            1 /
            ((canvas.getBoundingClientRect().width *
              (aspectRatioRatio < 1 ? aspectRatioRatio : 1)) /
              canvas.width) -
            (aspectRatioRatio < 1
              ? (canvas.width * (1 / aspectRatioRatio - 1)) / 2
              : 0) -
            swipeThreshold *
              (aspectRatioRatio < 1
                ? canvas.width / canvas.getBoundingClientRect().width
                : canvas.height / canvas.getBoundingClientRect().height),

          touch.lastpos.y / //- swipeThreshold / 2) /
            (canvas.getBoundingClientRect().height /
              (aspectRatioRatio > 1 ? aspectRatioRatio : 1) /
              canvas.height) -
            (aspectRatioRatio > 1
              ? (canvas.height * (aspectRatioRatio - 1)) / 2
              : 0) -
            swipeThreshold *
              (aspectRatioRatio < 1
                ? canvas.width / canvas.getBoundingClientRect().width
                : canvas.height / canvas.getBoundingClientRect().height),
          swipeThreshold *
            (aspectRatioRatio < 1
              ? canvas.width / canvas.getBoundingClientRect().width
              : canvas.height / canvas.getBoundingClientRect().height) *
            2,
          swipeThreshold *
            (aspectRatioRatio < 1
              ? canvas.width / canvas.getBoundingClientRect().width
              : canvas.height / canvas.getBoundingClientRect().height) *
            2,
        );*/
        requestAnimationFrame(draw);
      }

      function rotate(
        imgObj,
        extraObj = {
          x: imgObj.srcCoords.x,
          y: imgObj.srcCoords.y,
          angle: imgObj.angle,
        },
      ) {
        ctx.save();
        ctx.translate(imgObj.x, imgObj.y);
        ctx.rotate((extraObj.angle * Math.PI) / 180);
        ctx.translate(
          extraObj.angle >= 180 ? -1 * map.tile_length : 0,
          extraObj.angle <= 180 && extraObj.angle !== 0
            ? -1 * map.tile_length
            : 0,
        );

        ctx.scale(
          imgObj.height / map.tile_length,
          imgObj.width / map.tile_length,
        );
        ctx.translate(
          imgObj.height < 0 ? imgObj.height : 0,
          imgObj.width < 0 ? imgObj.width : 0,
        );
        if (imgObj === Snake) {
          ctx.fillRect(7, 1, -tickCounter, 8);
        }
        if (imgObj === SnakeSegments[0]) {
          ctx.fillRect(
            3,
            1,
            appleGrow ? -map.tile_length : tickCounter - map.tile_length,
            8,
          );
        }

        ctx.drawImage(
          imgObj.img,
          extraObj.x,
          extraObj.y,
          map.tile_length,
          map.tile_length,
          0,
          0,
          map.tile_length,
          map.tile_length,
        );

        ctx.restore();
      }
